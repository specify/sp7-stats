version: '3.9'

services:
  nginx:
    build: https://github.com/specify/nginx-with-github-auth.git#main
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - './sp7-stats/config/auth.conf:/etc/nginx/auth.conf:ro'
      - './sp7-stats/config/nginx.conf:/etc/nginx/conf.d/default.conf:ro'
      - './sp7-stats/:/var/www/:ro'
      - '/etc/letsencrypt:/etc/letsencrypt:ro'
      - './access-logs/:/var/log/nginx/external/:rw'
    networks:
      - nginx
    depends_on:
      - php

  php:
    build:
      context: ./
      target: back_end
    env_file:
      ./.env
    volumes:
      # CHANGE THIS:
      # Location of the place where all of your access.log files are located.
      # Make sure the web server has read permissions to all the files in this folder.
      - './access-logs/:/home/specify/access-logs/'
      - './sp7-stats/:/var/www/:ro'
      - 'working-dir:/home/specify/working-dir/'
    networks:
      - nginx

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - '/etc/letsencrypt:/etc/letsencrypt'
      - './sp7-stats/:/var/www/certbot/'
      - '/var/run/docker.sock:/var/run/docker.sock'
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --deploy-hook 'docker exec sp7-stats-nginx-1 nginx -s reload'; sleep 12h; done"
    networks:
      - nginx
    depends_on:
      - nginx

networks:
  nginx:

volumes:
  database:
  working-dir:
